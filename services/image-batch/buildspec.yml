version: 0.2

phases:
  install:
    commands:
      - pip install -r services/image-batch/requirements-dev.txt
  pre_build:
    commands:
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REPO_URI"
      - export IMAGE_TAG="$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-12)"
  build:
    commands:
      - cd services/image-batch
      - pytest
      - cd "$CODEBUILD_SRC_DIR"
      - docker build -f services/image-batch/Dockerfile -t "$ECR_REPO_URI:$IMAGE_TAG" .
      - docker push "$ECR_REPO_URI:$IMAGE_TAG"
  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" != "1" ]; then
          echo "Build failed; skipping task definition registration."
          exit 1
        fi
      # The task definition's SSOT is CDK; only the container image URI is updated here.
      - |
        TASK_DEFINITION="$(aws ecs describe-task-definition --task-definition "$TASK_DEF_FAMILY")"
        UPDATED_TASK_DEFINITION="$(echo "$TASK_DEFINITION" | jq \
          --arg image "$ECR_REPO_URI:$IMAGE_TAG" \
          --arg container_name "$CONTAINER_NAME" '
          .taskDefinition
          | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          | .containerDefinitions |= map(
              if .name == $container_name then .image = $image else . end
            )
        ')"
        aws ecs register-task-definition --cli-input-json "$UPDATED_TASK_DEFINITION"
